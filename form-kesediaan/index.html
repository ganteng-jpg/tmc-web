<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #333; }
    </style>
    <!-- Redirect otomatis setelah 2 detik supaya kelihatan animasinya -->
    <meta http-equiv="refresh" content="2; url='https://docs.google.com/forms/d/e/1FAIpQLSeOxQAXrkXM4GE8YxFIOZkF-WAWeEeOPDdQs3L7SsQm8CcSjA/viewform?usp=preview'">
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Menuju Formulir Sponsorship</h2>
        <p>Tunas Muda Cibuntu - HUT RI ke-81</p>
    </div>
</body>
</html>
