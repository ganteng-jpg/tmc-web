<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Agenda | Tunas Muda Cibuntu</title>
    <!-- Pastikan link ke style.css sudah benar -->
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Reset minimalis */
        body { margin: 0; font-family: sans-serif; background-color: #f4f4f4; color: #333; }

        /* Header Biru */
        .header-detail { background-color: #003366; color: white; padding: 60px 20px; text-align: center; }
        .header-detail h1 { margin: 0; font-size: 24px; }
        .header-detail p { margin-top: 10px; opacity: 0.8; }

        /* Card Konten */
        .wrapper { display: flex; justify-content: center; padding: 20px; }
        .card { 
            background: white; padding: 40px; border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            text-align: center; max-width: 400px; width: 100%;
        }
        
        /* Elemen Status */
        .status-badge { background: #eef2f7; color: #003366; padding: 15px; border-radius: 10px; margin: 20px 0; }
        
        /* Link & Tombol */
        .social-box { margin: 20px 0; }
        .social-box a { color: #003366; font-weight: bold; text-decoration: underline; margin: 0 5px; }
        .btn-detail { 
            display: inline-block; margin-top: 20px; padding: 12px 30px; 
            background-color: #003366; color: white; text-decoration: none; 
            border-radius: 50px; font-weight: bold; 
        }
    </style>
</head>
<body>

    <header class="header-detail">
        <h1>Maulid Nabi Muhammad SAW</h1>
        <p>Detail agenda sedang dalam tahap perencanaan</p>
    </header>

    <main class="wrapper">
        <section class="card">
            <h3>Segera Hadir!</h3>
            <p>Sesuatu yang Seru Sedang Dimasak. Stay Tuned!</p>
            
            <div class="status-badge">
                <p>Pantengin Terus Kita Di:</p>
                <div class="social-box">
                    <a href="https://instagram.com/official_tunas_muda" target="_blank">Instagram</a>
                    <span>dan</span>
                    <a href="https://tiktok.com/@tunasmudacibuntu" target="_blank">Tiktok</a>
                </div>
            </div>

            <a href="../index.html" class="btn-detail">Kembali ke Beranda</a>
        </section>
    </main>

</body>
</html>
